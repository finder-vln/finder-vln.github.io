<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Finder Full-Loop Grounding Demo</title>
  <style>
    :root {
      --panel: rgba(18, 28, 33, 0.80);
      --text: #eef0e8;
      --muted: #94a3a5;
      --cyan: #25cbc4;
      --amber: #e7aa45;
      --line: rgba(255,255,255,0.13);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Avenir Next", "DIN Alternate", "Gill Sans", sans-serif;
      background:
        radial-gradient(circle at 16% 10%, rgba(37,203,196,0.24), transparent 28%),
        radial-gradient(circle at 82% 16%, rgba(231,170,69,0.18), transparent 25%),
        linear-gradient(135deg, #05080b, #0b151b 48%, #11170f);
      overflow: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at 50% 34%, black, transparent 76%);
    }
    .shell {
      width: min(1540px, calc(100vw - 24px));
      margin: 0 auto;
      height: 100vh;
      padding: 8px 0 10px;
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 8px;
    }
    header {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 14px;
      align-items: center;
      margin-bottom: 0;
      min-height: 0;
    }
    h1 {
      margin: 0;
      font-size: clamp(36px, 4.2vw, 68px);
      letter-spacing: -0.08em;
      line-height: 0.86;
      font-weight: 900;
    }
    .jump span {
      display: inline-block;
      animation: hop 1.8s ease-in-out infinite;
    }
    .jump span:nth-child(2) { animation-delay: .05s; }
    .jump span:nth-child(3) { animation-delay: .1s; }
    .jump span:nth-child(4) { animation-delay: .15s; }
    .jump span:nth-child(5) { animation-delay: .2s; }
    .jump span:nth-child(6) { animation-delay: .25s; }
    @keyframes hop {
      0%, 70%, 100% { transform: translateY(0); color: var(--text); }
      34% { transform: translateY(-10px); color: var(--cyan); }
    }
    .query {
      justify-self: end;
      width: min(100%, 940px);
      padding: 12px 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(255,255,255,.08), rgba(255,255,255,.025));
      box-shadow: 0 24px 80px rgba(0,0,0,.32);
    }
    .eyebrow {
      color: var(--amber);
      text-transform: uppercase;
      letter-spacing: .18em;
      font-size: 13px;
      font-weight: 800;
    }
    .query p {
      margin: 4px 0 0;
      font-size: clamp(17px, 1.8vw, 28px);
      line-height: 1.08;
      font-family: "Georgia", "Baskerville", serif;
    }
    .demo {
      display: grid;
      grid-template-columns: 330px minmax(0, 1fr);
      gap: 12px;
      height: auto;
      min-height: 0;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      backdrop-filter: blur(18px);
      box-shadow: 0 28px 80px rgba(0,0,0,.34);
      overflow: hidden;
      min-height: 0;
    }
    .panel.pad { padding: 14px; }
    .left {
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      gap: 10px;
      min-height: 0;
    }
    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .15em;
      font-size: 12px;
      font-weight: 900;
    }
    .pulse {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 0 0 rgba(37,203,196,.7);
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse {
      70% { box-shadow: 0 0 0 14px rgba(37,203,196,0); }
      100% { box-shadow: 0 0 0 0 rgba(37,203,196,0); }
    }
    .stages {
      display: grid;
      grid-template-columns: 1fr;
      gap: 7px;
    }
    .stage {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      color: var(--text);
      border-radius: 14px;
      padding: 8px 10px;
      display: grid;
      grid-template-columns: 28px 1fr;
      grid-template-rows: auto auto;
      gap: 3px 8px;
      align-items: center;
      font: inherit;
      text-align: left;
      cursor: pointer;
      transition: transform .35s ease, border-color .35s ease, background .35s ease;
    }
    .stage em {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: rgba(255,255,255,.07);
      color: var(--muted);
      font-style: normal;
      font-weight: 900;
      font-size: 11px;
      grid-row: 1 / span 2;
    }
    .stage span { font-weight: 900; font-size: 16px; letter-spacing: -.045em; line-height: 1; }
    .stage b { color: var(--muted); font-size: 11px; justify-self: start; line-height: 1.1; }
    .stage.active {
      transform: translateY(-2px);
      border-color: rgba(37,203,196,.75);
      background: linear-gradient(90deg, rgba(37,203,196,.22), rgba(231,170,69,.08));
    }
    .stage.active em {
      background: var(--cyan);
      color: #061014;
    }
    .console {
      min-height: 0;
      border-radius: 16px;
      border: 1px solid rgba(37,203,196,.28);
      background: rgba(3, 8, 10, .78);
      padding: 12px;
      font-family: "Menlo", "Courier New", monospace;
      color: #baf6ed;
      font-size: 11px;
      line-height: 1.38;
      overflow: auto;
    }
    .console-line {
      display: block;
      margin: 0 0 5px;
      color: #baf6ed;
    }
    .console-line:first-child {
      color: #ffe4ae;
      font-weight: 800;
    }
    .console .cursor {
      display: inline-block;
      width: 9px;
      height: 18px;
      margin-left: 3px;
      background: var(--amber);
      vertical-align: -3px;
      animation: blink .8s steps(2) infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .phrases {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .phrases span {
      border: 1px solid rgba(231,170,69,.35);
      border-radius: 999px;
      padding: 5px 8px;
      color: #ffe4ae;
      background: rgba(231,170,69,.08);
      font-size: 11px;
    }
    .viewer {
      position: relative;
      padding: 14px;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      gap: 9px;
      min-width: 0;
      min-height: 0;
    }
    .viewer-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
    }
    .viewer h2 {
      margin: 0;
      font-size: clamp(25px, 2.9vw, 48px);
      letter-spacing: -.065em;
      line-height: .92;
    }
    .viewer-caption {
      margin: 0;
      color: #cfdbd6;
      font-size: 14px;
      line-height: 1.32;
      max-width: 980px;
    }
    .visual {
      min-height: 0;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: rgba(0,0,0,.25);
      overflow: hidden;
      position: relative;
      display: grid;
      place-items: center;
    }
    .visual img {
      width: auto;
      display: block;
      max-width: 100%;
      max-height: 100%;
      height: auto;
      object-fit: contain;
    }
    .route-board {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 1.12fr .88fr;
      gap: 8px;
      padding: 8px;
      align-items: stretch;
    }
    .route-pane {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 6px;
      min-width: 0;
      min-height: 0;
    }
    .route-pane label {
      color: var(--amber);
      text-transform: uppercase;
      letter-spacing: .14em;
      font-size: 10px;
      font-weight: 900;
    }
    .route-pane img {
      height: 100%;
      max-height: none;
      width: 100%;
      object-fit: contain;
      border-radius: 14px;
      background: rgba(255,255,255,.035);
      border: 1px solid rgba(255,255,255,.10);
    }
    .visual.scan::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      animation: scan 3.4s ease-in-out infinite;
      filter: drop-shadow(0 0 12px var(--cyan));
    }
    @keyframes scan {
      0%, 100% { transform: translateY(18px); opacity: .3; }
      50% { transform: translateY(86%); opacity: 1; }
    }
    .plan-board {
      width: min(820px, 92%);
      display: grid;
      gap: 18px;
      padding: 34px;
      border-radius: 28px;
      background:
        linear-gradient(135deg, rgba(37,203,196,.15), rgba(231,170,69,.08)),
        rgba(255,255,255,.045);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: inset 0 0 80px rgba(37,203,196,.08);
    }
    .plan-query {
      font-family: "Georgia", "Baskerville", serif;
      font-size: clamp(30px, 4vw, 58px);
      line-height: 1.05;
      letter-spacing: -.045em;
    }
    .arrow-row {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--amber);
      text-transform: uppercase;
      letter-spacing: .16em;
      font-size: 13px;
      font-weight: 900;
    }
    .arrow-row::before,
    .arrow-row::after {
      content: "";
      height: 1px;
      flex: 1;
      background: rgba(231,170,69,.42);
    }
    .plan-phrases {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .plan-phrases span {
      padding: 12px 15px;
      border-radius: 999px;
      background: rgba(37,203,196,.16);
      border: 1px solid rgba(37,203,196,.34);
      font-weight: 900;
      color: #d7fffb;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }
    .stat {
      border-radius: 14px;
      background: rgba(255,255,255,.055);
      border: 1px solid var(--line);
      padding: 8px 9px;
    }
    .stat label {
      display: block;
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .1em;
    }
    .stat strong {
      display: block;
      margin-top: 3px;
      font-size: 15px;
      letter-spacing: -.04em;
      overflow-wrap: anywhere;
    }
    .timeline {
      min-width: 170px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(20px, 1fr));
      gap: 7px;
    }
    .tick {
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,.14);
      transition: background .3s ease, box-shadow .3s ease;
    }
    .tick.active {
      background: var(--amber);
      box-shadow: 0 0 26px rgba(231,170,69,.55);
    }
    @media (max-width: 1200px) {
      .shell { width: min(100vw - 18px, 1120px); }
      header { grid-template-columns: 210px minmax(0, 1fr); }
      .demo { grid-template-columns: 292px minmax(0, 1fr); }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .route-board { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 760px) {
      body { overflow-y: auto; }
      .shell { height: auto; display: block; padding: 10px 0 14px; }
      header, .demo { grid-template-columns: 1fr; height: auto; }
      .query { justify-self: stretch; }
      .stages { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .visual { min-height: 360px; }
      .route-board { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <div class="eyebrow">Closed-loop object grounding</div>
        <h1 class="jump"><span>F</span><span>i</span><span>n</span><span>d</span><span>e</span><span>r</span></h1>
      </div>
      <section class="query">
        <div class="eyebrow">Language query</div>
        <p>white table with dark legs on the right side</p>
      </section>
    </header>

    <section class="demo">
      <aside class="panel pad left">
        <div class="panel-title">Finder replay <i class="pulse"></i></div>
        <div class="stages"><button class="stage" data-stage="0"><em>01</em><span>Plan</span><b>2 phrases</b></button>
<button class="stage" data-stage="1"><em>02</em><span>Detect</span><b>16 candidates</b></button>
<button class="stage" data-stage="2"><em>03</em><span>Evidence</span><b>context</b></button>
<button class="stage" data-stage="3"><em>04</em><span>Selection Plan</span><b>3 shortlist</b></button>
<button class="stage" data-stage="4"><em>05</em><span>Select</span><b>verify</b></button>
<button class="stage" data-stage="5"><em>06</em><span>Judge</span><b>accept</b></button></div>
        <div class="console">
          <div id="console-line"></div><span class="cursor"></span>
        </div>
        <div class="phrases"><span>white table</span> <span>table with dark legs</span></div>
      </aside>

      <section class="panel viewer">
        <div class="viewer-head">
          <div>
            <div class="eyebrow">Replay step</div>
            <h2 id="stage-title"></h2>
          </div>
          <div class="timeline"><div class="tick" data-stage="0"></div><div class="tick" data-stage="1"></div><div class="tick" data-stage="2"></div><div class="tick" data-stage="3"></div><div class="tick" data-stage="4"></div><div class="tick" data-stage="5"></div></div>
        </div>
        <p class="viewer-caption" id="stage-caption"></p>
        <div class="visual scan" id="stage-visual"></div>
        <div class="stats" id="stage-stats"></div>
      </section>
    </section>
  </main>

  <script>
    const TRACE = {"title": "Finder Full-Loop Grounding Demo", "query": "white table with dark legs on the right side", "target": "white table", "phrases": ["white table", "table with dark legs"], "route_grid": "assets/finder_routed_frames.jpg", "topdown_map": "", "sam_grid": "assets/detect_candidate_pool.jpg", "best_overlay": "assets/judge_final.jpg", "best": {"frame_name": "1757050935694.5803", "prompt": "white table", "score": 0.8793851137161255, "area": 355, "bbox": [367, 298, 605, 479]}, "metrics": {"scene_frames": 26, "route_frames": 26, "searched_frames": 26, "candidates": 16, "status": "accepted"}, "stages": [{"key": "plan", "name": "Plan", "line": "Parse the request into a primary target, support context, and scoped frame budget.", "metric": "2 phrases", "visual_title": "Query-conditioned search plan", "visual_kind": "image", "image": "assets/finder_routed_frames.jpg", "caption": "Finder first turns the language request into target phrases and routes a compact evidence set for the loop.", "stats": [{"label": "Target", "value": "white table"}, {"label": "Support", "value": "none"}, {"label": "Routed views", "value": 26}, {"label": "Plan time", "value": "18.9s"}], "logs": ["planner.reason: Loop 0: LLM planner selected 'white table' as the primary target with 0 supporting target(s).", "evidence.goals: Find a white table object; Verify the table has dark-colored legs; Confirm the table is positioned on the right side of the viewed scene", "routing.scope: global_fallback"]}, {"key": "detect", "name": "Detect", "line": "Run SAM3 only as the open-vocabulary mask proposal backend, then build 3D candidates.", "metric": "16 candidates", "visual_title": "Detected candidate pool", "visual_kind": "image", "image": "assets/detect_candidate_pool.jpg", "caption": "The detector surfaces multiple plausible object masks; downstream Finder stages keep the ambiguity instead of taking the top SAM3 mask directly.", "stats": [{"label": "Candidates", "value": 16}, {"label": "Instances", "value": 16}, {"label": "Frames", "value": 26}, {"label": "Detect time", "value": "11.7s"}], "logs": ["detect.backend: remote SAM3 masks, Finder 3D clustering and dedup", "detect.top: white_table_l0_000 det=0.92; white_table_l0_014 det=0.92; white_table_l0_004 det=0.92; white_table_l0_005 det=0.91", "detect.primary: white table"]}, {"key": "evidence", "name": "Evidence", "line": "Attach candidate-local geometry and support-object evidence before planning selection.", "metric": "context", "visual_title": "Candidate-local evidence", "visual_kind": "image", "image": "assets/evidence_candidate_context.jpg", "caption": "Candidate evidence makes support relations explicit, so the later selector compares candidates in context rather than by mask confidence alone.", "stats": [{"label": "Support policy", "value": "none"}, {"label": "Evidence cards", "value": 16}, {"label": "Feature time", "value": "0.00s"}, {"label": "Context time", "value": "0.00s"}], "logs": ["support.targets: none", "support.mode: none", "evidence.reason: geometry and support cues are available to selection planner"]}, {"key": "selection_plan", "name": "Selection Plan", "line": "Shortlist candidates and choose comparison axes for verification.", "metric": "3 shortlist", "visual_title": "Shortlist and comparison plan", "visual_kind": "image", "image": "assets/selection_plan_shortlist.jpg", "caption": "The selection planner narrows the candidate pool and specifies what relation or attribute evidence must be checked.", "stats": [{"label": "Shortlist", "value": 3}, {"label": "Mode", "value": "direct_all"}, {"label": "Axes", "value": "spatial_right_side, table_shape"}, {"label": "Plan time", "value": "17.9s"}], "logs": ["shortlist.keys: white_table_l0_000; white_table_l0_003; white_table_l0_004", "selection.reason: Query specifies 'white table with dark legs on the right side'. No relation evidence is available, so spatial positioning from 'right side' hint is primary filter. Analyzing cen...", "actions: filter candidates by spatial hint 'right side'; compare candidate positions for right-side placement; verify table appearance (white, dark legs) on shortlisted candidates"]}, {"key": "select", "name": "Select", "line": "Compare shortlisted candidates with VLM verification and select the strongest candidate.", "metric": "verify", "visual_title": "Candidate comparison", "visual_kind": "image", "image": "assets/select_comparison.jpg", "caption": "The selector compares the shortlisted candidates and records rationales for why the accepted candidate beats alternatives.", "stats": [{"label": "Best key", "value": "white_table_l0_003"}, {"label": "Best score", "value": 0.7086000000000001}, {"label": "Rounds", "value": 1}, {"label": "Select time", "value": "18.4s"}], "logs": ["select.scores: white_table_l0_003 sel=0.71; white_table_l0_004 sel=0.71; white_table_l0_000 sel=0.71", "select.reason: Visual verification of three candidates for 'white table with dark legs on the right side'. Candidate white_table_l0_000 (image_index=1) is a small round white table with dark legs, locat...", "verifier.summary: Visual verification of three candidates for 'white table with dark legs on the right side'. Candidate white_table_l0_000 (image_index=1) is a small round white table with dark l..."]}, {"key": "judge", "name": "Judge", "line": "Return accept for white_table_l0_003.", "metric": "accept", "visual_title": "Accepted grounding", "visual_kind": "image", "image": "assets/judge_final.jpg", "caption": "The loop judge accepts the selected candidate once the evidence is sufficient; otherwise the same protocol can continue with feedback.", "stats": [{"label": "Action", "value": "accept"}, {"label": "Accepted", "value": "white_table_l0_003"}, {"label": "Loops", "value": 1}, {"label": "Judge time", "value": "12.2s"}], "logs": ["judge.action: accept", "judge.reason: Candidate white_table_l0_003 is the strongest match for 'white table with dark legs on the right side'. Visual verification confirms strong match for all query attributes (white surface, dark legs, right-side position...", "final.key: white_table_l0_003"]}]};
    const stages = Array.from(document.querySelectorAll('.stage'));
    const ticks = Array.from(document.querySelectorAll('.tick'));
    const line = document.getElementById('console-line');
    const title = document.getElementById('stage-title');
    const caption = document.getElementById('stage-caption');
    const visual = document.getElementById('stage-visual');
    const stats = document.getElementById('stage-stats');
    let active = 0;
    const htmlMap = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'};
    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => htmlMap[ch]);
    }
    function renderStats(stage) {
      stats.innerHTML = (stage.stats || []).map(item => (
        '<div class="stat"><label>' + escapeHtml(item.label) + '</label><strong>' +
        escapeHtml(item.value) + '</strong></div>'
      )).join('');
    }
    function renderLogs(stage) {
      const rows = ['[' + stage.name.toUpperCase() + '] ' + stage.line].concat(stage.logs || []);
      line.innerHTML = rows.map(row => '<span class="console-line">' + escapeHtml(row) + '</span>').join('');
    }
    function renderVisual(stage) {
      visual.classList.toggle('scan', stage.key === 'detect' || stage.key === 'selection_plan' || stage.key === 'refine');
      if (stage.visual_kind === 'plan') {
        visual.innerHTML =
          '<div class="plan-board">' +
            '<div class="eyebrow">Parsed request</div>' +
            '<div class="plan-query">' + escapeHtml(TRACE.query) + '</div>' +
            '<div class="arrow-row">target phrases</div>' +
            '<div class="plan-phrases">' + (TRACE.phrases || []).map(p => '<span>' + escapeHtml(p) + '</span>').join('') + '</div>' +
          '</div>';
        return;
      }
      if (stage.visual_kind === 'route_map') {
        visual.classList.remove('scan');
        visual.innerHTML =
          '<div class="route-board">' +
            '<div class="route-pane"><label>Top-down routed camera poses</label><img src="' + escapeHtml(stage.map_image || TRACE.topdown_map || stage.image) + '" alt="Top-down route map"></div>' +
            '<div class="route-pane"><label>Selected evidence frames</label><img src="' + escapeHtml(stage.image || TRACE.route_grid) + '" alt="Selected frame grid"></div>' +
          '</div>';
        return;
      }
      visual.innerHTML = '<img src="' + escapeHtml(stage.image || TRACE.sam_grid) + '" alt="' + escapeHtml(stage.visual_title || stage.name) + '">';
    }
    function render(i) {
      active = i % TRACE.stages.length;
      const stage = TRACE.stages[active];
      stages.forEach((el, idx) => el.classList.toggle('active', idx === active));
      ticks.forEach((el, idx) => el.classList.toggle('active', idx === active));
      title.textContent = stage.visual_title || stage.name;
      caption.textContent = stage.caption || stage.line;
      renderLogs(stage);
      renderVisual(stage);
      renderStats(stage);
    }
    stages.forEach((el, idx) => el.addEventListener('click', () => render(idx)));
    render(0);
  </script>
</body>
</html>
